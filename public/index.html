<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rex REST API</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <div class="mobile-sidebar-overlay" id="mobileOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">//</div>
      <div class="logo-name">Rex REST API</div>
      <div class="logo-ver">v2.0.0 — by Arnov</div>
    </div>
    <div class="sidebar-base">
      <div class="base-label">Base URL</div>
      <div class="base-url" id="baseUrl">http://localhost:7860</div>
    </div>
    <div class="sidebar-stats">
      <div class="stat-box">
        <div class="stat-num" id="totalEp">0</div>
        <div class="stat-lbl">Endpoints</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="totalCat">0</div>
        <div class="stat-lbl">Kategori</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Navigasi</div>
      <div id="navItems"></div>
    </nav>
    <div class="sidebar-foot">
      <div class="clock-row">
        <span class="pulse"></span>
        <div>
          <div class="clock-time" id="clock">00:00:00</div>
          <div class="clock-status">Server aktif</div>
        </div>
      </div>
      <a class="docs-btn" href="/api/docs" target="_blank" rel="noopener noreferrer">API Documentation</a>
    </div>
  </aside>

  <div class="content">
    <div class="mobile-bar">
      <button class="hamburger-btn" id="mobileMenuBtn">☰</button>
      <span class="mobile-logo">// Rex API</span>
      <span class="mobile-clock" id="mclock">00:00:00</span>
    </div>
    <div class="content-header">
      <div class="content-title" id="activeTitle">Semua Endpoint</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Cari endpoint...">
      </div>
    </div>
    <div id="mainContent"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-top">
      <div class="modal-titlerow">
        <div class="modal-name" id="mName"></div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-meta">
        <span class="mtag" id="mMethod"></span>
        <span class="modal-path" id="mPath"></span>
      </div>
      <p class="modal-desc" id="mDesc"></p>
    </div>
    <div class="tabs" id="tabRow"></div>
    <div class="tab-body" id="tabBody"></div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
